# Paybot SDK QA – Jira/Xray/Confluence Synchronization
#
# Purpose: Automatically sync GitHub PR/test results with Jira stories, Xray test suites,
# and Confluence QA plan during Sprint 1 (and all future sprints).
#
# Triggers:
# 1. On PR creation: Link PR to Jira story (if PAYBOT-N in title)
# 2. On PR merge: Mark Jira story as "Code Review Passed"
# 3. On test run: Upload results to Xray test suite
# 4. On sprint completion: Update Confluence plan with final status
#
# Requirements:
# - JIRA_BASE_URL, JIRA_USER_EMAIL, JIRA_API_TOKEN (GitHub Secrets)
# - XRAY_API_ID, XRAY_API_KEY (GitHub Secrets)
# - CONFLUENCE_BASE_URL, CONFLUENCE_API_TOKEN (GitHub Secrets)

name: Paybot QE – Jira/Xray/Confluence Sync

on:
  pull_request:
    types: [opened, edited, reopened]
    branches: [main, develop]
  push:
    branches: [main, develop]
  schedule:
    # Run daily at 5 AM UTC to sync status
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  # ============================================================
  # JOB 1: Link PR to Jira Story
  # ============================================================
  link-pr-to-jira:
    name: Link PR to Jira Story
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract Jira story from PR title
        id: jira
        run: |
          # Extract PAYBOT-N from PR title (e.g., "[PAYBOT-3] Implement payment schema")
          story=$(echo "${{ github.event.pull_request.title }}" | grep -oP 'PAYBOT-\d+' | head -1)
          if [ -z "$story" ]; then
            echo "story=" >> $GITHUB_OUTPUT
          else
            echo "story=$story" >> $GITHUB_OUTPUT
          fi

      - name: Link PR to Jira issue
        if: steps.jira.outputs.story != ''
        uses: atlassian/gajira-link@v3
        with:
          issue: ${{ steps.jira.outputs.story }}
          link-type: "is linked by"
          link-to: ${{ github.server_url }}/${{ github.repository }}/pull/${{ github.event.pull_request.number }}
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}

      - name: Add PR comment with Jira link
        if: steps.jira.outputs.story != ''
        uses: actions/github-script@v7
        with:
          script: |
            const story = '${{ steps.jira.outputs.story }}';
            const comment = `🔗 **Jira Link:** [${story}](${{ secrets.JIRA_BASE_URL }}/browse/${story})`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ============================================================
  # JOB 2: Run Tests & Upload Results to Xray
  # ============================================================
  test-and-upload-xray:
    name: Tests & Xray Upload
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        id: unit-tests
        run: |
          npm test -- \
            --reporter=junit \
            --reporter=default \
            --outputFile=test-results/unit-tests.xml \
            --coverage \
            --coverage-reporter=cobertura
        continue-on-error: true

      - name: Run integration tests
        id: integration-tests
        run: |
          npm run test:integration -- \
            --reporter=junit \
            --outputFile=test-results/integration-tests.xml
        continue-on-error: true

      - name: Merge test results
        run: |
          mkdir -p test-results
          # Combine unit + integration into single file for Xray
          cat test-results/unit-tests.xml test-results/integration-tests.xml > \
              test-results/combined.xml

      - name: Upload results to Xray
        if: always()
        uses: atlassian/gajira-upload-results@v3
        with:
          file: test-results/combined.xml
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          XRAY_API_ID: ${{ secrets.XRAY_API_ID }}
          XRAY_API_KEY: ${{ secrets.XRAY_API_KEY }}

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage/cobertura-coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Comment on PR with test results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = '${{ job.status }}' === 'success' ? '✅' : '⚠️';
            const comment = `${coverage} **Test Results**

            - Unit tests: ${{ steps.unit-tests.outcome }}
            - Integration tests: ${{ steps.integration-tests.outcome }}

            📊 See [Xray test execution](https://xray.cloud.getxray.app/browse/testexecution) for details.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ============================================================
  # JOB 3: Lint & Type Check
  # ============================================================
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: npm run lint -- --format json > lint-results.json
        continue-on-error: true

      - name: Run TypeScript type check
        id: typecheck
        run: npm run typecheck
        continue-on-error: true

      - name: Comment on PR with lint results
        if: github.event_name == 'pull_request' && steps.eslint.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const lintResults = JSON.parse(fs.readFileSync('lint-results.json', 'utf8'));

            let issues = '';
            lintResults.forEach(file => {
              file.messages.forEach(msg => {
                issues += `- ${file.filePath}:${msg.line} — ${msg.message}\n`;
              });
            });

            const comment = `⚠️ **Lint Issues Found**

            ${issues || 'No issues found'}

            Run \`npm run lint -- --fix\` to auto-fix some issues.`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ============================================================
  # JOB 4: Security Audit (npm audit)
  # ============================================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        id: audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

      - name: Comment on PR if vulnerabilities found
        if: github.event_name == 'pull_request' && steps.audit.outcome != 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const comment = `⚠️ **Security Issues Found**

            npm audit detected vulnerabilities. Run:

            \`\`\`bash
            npm audit
            npm audit fix
            \`\`\`

            For details, see [npm audit results](npm audit).`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ============================================================
  # JOB 5: Update Jira Story Status on PR Merge
  # ============================================================
  update-jira-on-merge:
    name: Update Jira Story (PR Merged)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get merged PR info
        id: pr
        run: |
          # Get the last merged PR title
          title=$(git log -1 --pretty=%B | head -1)
          echo "title=$title" >> $GITHUB_OUTPUT

          # Extract PAYBOT-N from commit message
          story=$(echo "$title" | grep -oP 'PAYBOT-\d+' | head -1)
          echo "story=$story" >> $GITHUB_OUTPUT

      - name: Update Jira issue to "Code Review Passed"
        if: steps.pr.outputs.story != ''
        uses: atlassian/gajira-transition@v3
        with:
          issue: ${{ steps.pr.outputs.story }}
          transition: "Code Review Passed"
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_USER_EMAIL: ${{ secrets.JIRA_USER_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        continue-on-error: true

  # ============================================================
  # JOB 6: Daily Confluence Plan Status Sync
  # ============================================================
  sync-confluence-status:
    name: Sync Confluence Plan Status
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Query Jira for current sprint status
        id: sprint-status
        run: |
          # Query PAYBOT issues in current sprint
          # This is a simplified example; adapt to your Jira setup

          echo "stories_todo=0" >> $GITHUB_OUTPUT
          echo "stories_in_progress=0" >> $GITHUB_OUTPUT
          echo "stories_done=0" >> $GITHUB_OUTPUT

          # In practice, use Jira API to fetch actual counts
          # curl -H "Authorization: Bearer $JIRA_API_TOKEN" \
          #   https://friendlyai.atlassian.net/rest/api/3/search?jql=...

      - name: Get Xray test results
        id: xray-results
        run: |
          # Query Xray for test suite results
          # Simplified example

          echo "total_tests=87" >> $GITHUB_OUTPUT
          echo "passed_tests=85" >> $GITHUB_OUTPUT
          echo "pass_rate=97.7" >> $GITHUB_OUTPUT

      - name: Update Confluence plan page
        run: |
          # Use Confluence API to update "Sprint 1 QA Plan" page
          # with current status

          cat > update-confluence.json <<EOF
          {
            "version": {
              "number": 2
            },
            "title": "Sprint 1 – Paybot SDK QA Plan",
            "type": "page",
            "body": {
              "storage": {
                "value": "<h2>Live Test Status (Last updated: $(date))</h2><table><tr><td>Total Tests</td><td>${{ steps.xray-results.outputs.total_tests }}</td></tr><tr><td>Passed</td><td>${{ steps.xray-results.outputs.passed_tests }}</td></tr><tr><td>Pass Rate</td><td>${{ steps.xray-results.outputs.pass_rate }}%</td></tr></table>"
              }
            }
          }
          EOF

          # In practice, use Confluence API to update the page
          # curl -X PUT \
          #   -H "Authorization: Bearer $CONFLUENCE_API_TOKEN" \
          #   https://friendlyai.atlassian.net/wiki/api/v2/pages/... \
          #   -d @update-confluence.json
        env:
          CONFLUENCE_BASE_URL: ${{ secrets.CONFLUENCE_BASE_URL }}
          CONFLUENCE_API_TOKEN: ${{ secrets.CONFLUENCE_API_TOKEN }}

  # ============================================================
  # JOB 7: Status Check Summary
  # ============================================================
  status-summary:
    name: Workflow Status Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [link-pr-to-jira, test-and-upload-xray, lint-and-typecheck, security-audit]
    steps:
      - name: Check workflow status
        run: |
          echo "✅ Workflow Summary"
          echo "==================="
          echo "Link PR to Jira: ${{ needs.link-pr-to-jira.result }}"
          echo "Tests & Xray: ${{ needs.test-and-upload-xray.result }}"
          echo "Lint & Type Check: ${{ needs.lint-and-typecheck.result }}"
          echo "Security Audit: ${{ needs.security-audit.result }}"

          # Set exit code based on critical jobs
          if [ "${{ needs.link-pr-to-jira.result }}" = "failure" ]; then
            exit 1
          fi

# ============================================================
# SECRETS REQUIRED (Add to GitHub repo settings)
# ============================================================
#
# JIRA_BASE_URL=https://friendlyai.atlassian.net
# JIRA_USER_EMAIL=your-email@example.com
# JIRA_API_TOKEN=<generate from Jira settings>
#
# XRAY_API_ID=<from Xray settings>
# XRAY_API_KEY=<from Xray settings>
#
# CONFLUENCE_BASE_URL=https://friendlyai.atlassian.net/wiki
# CONFLUENCE_API_TOKEN=<generate from Confluence settings>
#
# ============================================================
