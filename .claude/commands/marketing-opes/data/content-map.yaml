    razao: "Não reforça 'gênio e caro'. Atrai público de self-help, não empresário."
  - nome: "Neurodivergência"
    razao: "Identidade médica ≠ identidade profissional. Dilui posicionamento."
  - nome: "Nexialismo (como conceito nomeado)"
    razao: "Jargão que ninguém busca. A prática vive como 'skill stacking' em Jornada Real."
  - nome: "Genius Zone Analysis"
    razao: "Cheira a coaching. Substituído por 'foco no que só eu faço' dentro de Build in Public."
  - nome: "Tom Naval (oráculo aphorístico)"
    razao: "Frases soltas sem contexto. Substituído por tom Dan Koe (construtor que explica o processo)."

