# Domain Decoder: Extraction Heuristics
# Decision heuristics and veto conditions for the 7-phase extraction pipeline.
# Adapted from Pedro Valerio process design methodology and squad-creator
# decision-heuristics-framework. These conditions are NON-NEGOTIABLE gates.
#
# Design Principles (Pedro Valerio):
#   1. Zero-wrong-paths: wrong outputs are impossible to pass downstream
#   2. Unidirectional flow: phases only move forward; corrections are additive
#   3. Veto conditions at every gate: failures stop the pipeline, not warn it
#   4. Teste da filha: every output readable by a non-technical stakeholder
#   5. Five mandatory guardrails: loop prevention, idempotency, audit trail,
#      manual escape, retry logic
#
# Reference: docs/research/2026-02-19-domain-decoder-brainstorm.md, Sections 5 and 7
# Version: 1.0.0

metadata:
  total_heuristics: 8
  total_veto_conditions: 23
  pipeline_phases: 7
  version: "1.0.0"
  last_updated: "2026-02-19"

# ============================================================
# PHASE 0: TRIAGE — Gap Analysis Gate
# ============================================================
DD_GAP_001:
  id: DD_GAP_001
  name: "Gap Analysis Gate"
  phase: 0
  phase_name: "Triage"
  agent: domain-decoder-chief
  purpose: >
    Determine if the codebase is viable for extraction before investing
    agent time. Also estimates effort and surfaces risks early.
  category: "viability_check"

  inputs:
    required:
      - "Repository path or URL"
    optional:
      - "Existing documentation (README, wiki, ADRs)"
      - "Stakeholder context (what they think the system does)"

  checks:
    - id: DD_GAP_001_A
      name: "Minimum LOC threshold"
      condition: "total_lines_of_code < 500"
      action: VETO
      severity: BLOCKING
      message: >
        Codebase has fewer than 500 lines of code. Domain Decoder is designed for
        brownfield/legacy systems. Small codebases are better understood through
        direct human review. Recommend manual reading instead.
      recommendation: "Read the codebase directly — it is small enough."

    - id: DD_GAP_001_B
      name: "Source code availability"
      condition: "no_executable_code_found OR documentation_only_repo"
      action: VETO
      severity: BLOCKING
      message: >
        No executable source code found. Repository appears to contain only documentation,
        configuration files, or assets. Domain Decoder cannot operate without source code.
      recommendation: "Verify the correct repository was provided."

    - id: DD_GAP_001_C
      name: "Obfuscation check"
      condition: "code_is_obfuscated OR minified_without_source_maps"
      action: VETO
      severity: BLOCKING
      message: >
        Code appears to be obfuscated or minified without source maps. Semantic extraction
        requires human-readable source code. Obfuscated code cannot be meaningfully analyzed.
      recommendation: "Locate the source repository (pre-build) and run extraction there."

    - id: DD_GAP_001_D
      name: "Test coverage signal"
      condition: "no_test_files_found"
      action: WARN
      severity: NON_BLOCKING
      message: >
        No test files detected. L5 (business rules) triangulation will be weaker without
        test evidence. Business rules will have lower average confidence scores.
        Recommend flagging all L5 findings as MEDIUM confidence regardless of other sources.
      mitigation: "Increase scrutiny during Roundtable for all L5 findings."

    - id: DD_GAP_001_E
      name: "Knowledge concentration risk"
      condition: "single_contributor AND no_comments AND no_readme"
      action: WARN
      severity: NON_BLOCKING
      message: >
        Codebase has a single contributor with no comments or README. Knowledge is
        concentrated in one person. L6 (domain model) and L7 (business model) extraction
        will be significantly harder without documentation signals.
      mitigation: "Consider interviewing the sole contributor to validate L5-L7 findings."

  pass_condition: "No BLOCKING vetos fired"
  output: "data/reports/triage-report.yaml"

  effort_estimation:
    small: "< 10K LOC — approximately 1-2 hours total pipeline"
    medium: "10K-100K LOC — approximately 5-7 hours total pipeline"
    large: "> 100K LOC — approximately 15-25 hours total pipeline"
    polyglot_multiplier: "Add 20-30% per additional language beyond primary"

# ============================================================
# PHASE 1: FOUNDATION — Inventory Completeness
# ============================================================
DD_INV_001:
  id: DD_INV_001
  name: "Inventory Completeness Gate"
  phase: 1
  phase_name: "Foundation Scan (L1 + L2)"
  agent: code-cartographer
  purpose: >
    Ensure the structural foundation is solid before behavior mapping begins.
    Missing L1/L2 data propagates as errors through all subsequent layers.
  category: "completeness_check"

  inputs:
    required:
      - "data/reports/triage-report.yaml (Phase 0 output)"

  checks:
    - id: DD_INV_001_A
      name: "Primary language identification"
      condition: "primary_language == 'unknown' OR architecture_style == 'unknown'"
      action: VETO
      severity: BLOCKING
      message: >
        Cannot identify the primary programming language or architecture style.
        This indicates an exotic technology, heavily transpiled code, or a
        polyglot codebase without a clear primary layer. Manual assessment required.
      recommendation: "Run manual L1 analysis or consult a human expert on the tech stack."

    - id: DD_INV_001_B
      name: "Circular dependency threshold"
      condition: "circular_dependency_ratio > 0.50"
      action: WARN
      severity: NON_BLOCKING
      message: >
        More than 50% of module dependencies are circular. This indicates heavily
        coupled architecture. L6 bounded context extraction will be significantly
        harder — the code resists natural decomposition.
      mitigation: "Use the Feathers Seam Model (see minds/michael-feathers.md) to find seams despite coupling."

    - id: DD_INV_001_C
      name: "Polyglot complexity"
      condition: "language_count > 5"
      action: WARN
      severity: NON_BLOCKING
      message: >
        More than 5 programming languages detected. Polyglot complexity multiplies
        extraction effort. Structural tools (ast-grep, code-graph-mcp) have varying
        coverage across languages.
      mitigation: >
        Identify the primary business logic language and focus extraction there.
        Treat secondary languages as integration points unless they contain domain logic.

    - id: DD_INV_001_D
      name: "Entry point coverage"
      condition: "entry_points_identified / total_api_endpoints < 0.85"
      action: WARN
      severity: NON_BLOCKING
      message: >
        Less than 85% of API endpoints have traceable entry points. Some code paths
        may be generated, dynamically registered, or use reflection patterns.
      mitigation: "Document coverage gap. Use test files as alternative entry point signals."

  pass_condition: "No BLOCKING vetos fired"
  output: "data/findings/l1-code-patterns.yaml + data/findings/l2-api-contracts.yaml"

# ============================================================
# PHASE 2: BEHAVIOR — Slice Selection Quality
# ============================================================
DD_SLC_001:
  id: DD_SLC_001
  name: "Slice Selection Quality Gate"
  phase: 2
  phase_name: "Behavior Mapping (L3 + L4)"
  agent: code-cartographer
  purpose: >
    Verify that the behavioral extraction produced meaningful slices before
    business intelligence extraction begins. Poor slices produce poor rules.
  category: "selection_quality"

  inputs:
    required:
      - "data/findings/l1-code-patterns.yaml"
      - "data/findings/l2-api-contracts.yaml"

  checks:
    - id: DD_SLC_001_A
      name: "Workflow detection completeness"
      condition: "workflow_count == 0 AND codebase_type != 'pure_crud'"
      action: WARN
      severity: NON_BLOCKING
      message: >
        Zero automated workflows detected in a non-CRUD system. This is unusual and
        may indicate: (1) workflows are implemented as synchronous request-response chains
        rather than background jobs, (2) the detection patterns missed the workflow library
        in use, or (3) all business logic is manual/human-driven.
      mitigation: >
        Review L1 framework list — if framework is unusual, add custom workflow detection
        patterns. Document as 'Primarily synchronous CRUD architecture' if confirmed.

    - id: DD_SLC_001_B
      name: "Validation to endpoint ratio"
      condition: "validation_rule_count < (api_endpoint_count * 0.10)"
      action: WARN
      severity: NON_BLOCKING
      message: >
        Fewer than 10% of API endpoints have detectable validation rules. This indicates
        an under-validated system — a significant business risk and a signal that business
        rules may be embedded in the database layer or frontend rather than the backend.
      mitigation: >
        Extend search to database constraints (migrations), frontend validation,
        and ORM-level validations. Document as 'Under-validated API surface'.

    - id: DD_SLC_001_C
      name: "Business rule candidate density"
      condition: "business_rule_candidates_identified < 10"
      action: WARN
      severity: NON_BLOCKING
      message: >
        Fewer than 10 business rule candidates identified after L4 extraction.
        The system may be a thin wrapper around a third-party service, or business
        logic may be in a layer not yet analyzed (stored procedures, external rules engine).
      mitigation: >
        Check for stored procedures, external rule engines, or configuration-driven
        business logic. Adjust Pass 1 patterns in extract-business-rules task.

  pass_condition: "No BLOCKING vetos fired (all warnings are advisory)"
  output: "data/findings/l3-workflows.yaml + data/findings/l4-validation-rules.yaml"

# ============================================================
# PHASE 3: BUSINESS INTELLIGENCE — Summarization Accuracy
# ============================================================
DD_SUM_001:
  id: DD_SUM_001
  name: "Summarization Accuracy Gate"
  phase: 3
  phase_name: "Business Intelligence Extraction (L5 + L6 + L7)"
  agent: validation-arbiter
  purpose: >
    Ensure the business intelligence extraction produced high-enough quality
    findings before Roundtable investment. Low-confidence extraction at this stage
    means the methodology needs calibration, not just debate.
  category: "accuracy_check"

  inputs:
    required:
      - "data/findings/l3-workflows.yaml"
      - "data/findings/l4-validation-rules.yaml"

  checks:
    - id: DD_SUM_001_A
      name: "L5 catalog minimum confidence"
      condition: "(l5_medium_plus_confidence_count / l5_total_findings) < 0.70"
      action: VETO
      severity: BLOCKING
      message: >
        Less than 70% of L5 business rule findings are at MEDIUM+ confidence.
        This indicates the extraction methodology is not calibrated for this codebase.
        Proceeding to Roundtable would waste significant resources on low-quality findings.
      resolution: >
        Retry Phase 3 L5 extraction with adjusted Pass 1 patterns. Reduce scope to the
        highest-complexity module only. Run a calibration pass on 10% of candidates before
        full extraction. Maximum 1 retry — if still below 70%, document as partial extraction.
      max_retries: 1

    - id: DD_SUM_001_B
      name: "L6 bounded context coherence"
      condition: "l6_unbounded_entities > 0"
      action: VETO
      severity: BLOCKING
      message: >
        One or more domain entities have no clear bounded context assignment.
        Every entity must belong to exactly one bounded context for the domain model
        to be usable. Unbounded entities indicate incomplete or inconsistent extraction.
      resolution: >
        Review unbounded entities. Either assign to an existing context, create a
        new context to contain them, or document as 'Generic subdomain' if they
        are cross-cutting utilities.

    - id: DD_SUM_001_C
      name: "L7 graceful degradation"
      condition: "l7_no_financial_logic_found"
      action: PASS
      severity: INFORMATIONAL
      message: >
        No financial or monetization logic detected in the codebase. This is a valid
        outcome for internal tools, open-source projects, or early-stage products.
        Document explicitly in the final report.
      output_note: "Document as 'No monetization layer detected' — not an error."

    - id: DD_SUM_001_D
      name: "Roundtable rejection rate"
      condition: "roundtable_rejection_rate > 0.30"
      action: WARN
      severity: NON_BLOCKING
      message: >
        More than 30% of findings submitted to Roundtable were rejected.
        This indicates the extraction methodology may need calibration for this
        codebase's domain or architectural style.
      mitigation: >
        Review rejected findings for patterns. Adjust Pass 1 candidate selection
        patterns. Consider whether expert mind personas need adjustment for this domain.

  pass_condition: "No BLOCKING vetos fired; all INFORMATIONAL conditions documented"
  output: "data/findings/l5-business-rules.yaml + data/findings/l6-domain-taxonomy.yaml + data/findings/l7-business-model.yaml"

# ============================================================
# PHASE 4: DOMAIN MODEL — Domain Model Coherence
# ============================================================
DD_DDD_001:
  id: DD_DDD_001
  name: "Domain Model Coherence Gate"
  phase: 4
  phase_name: "Domain Model Validation"
  agent: validation-arbiter
  purpose: >
    Verify that the extracted domain model is internally consistent and
    follows DDD structural rules before being included in final deliverables.
  category: "structural_coherence"

  inputs:
    required:
      - "data/findings/l5-business-rules.yaml"
      - "data/findings/l6-domain-taxonomy.yaml"
      - "data/roundtable/resolved-debates.yaml"

  checks:
    - id: DD_DDD_001_A
      name: "Business rule orphan check"
      condition: "l5_rules_without_bounded_context > 0"
      action: VETO
      severity: BLOCKING
      message: >
        One or more L5 business rules have no bounded context assignment.
        Every business rule must belong to a bounded context in the domain model.
        Orphaned rules indicate a gap between L5 and L6 extraction.
      resolution: >
        For each orphaned rule: (1) assign to an existing context if domain analysis
        supports it, (2) create a new bounded context if the rule reveals a missing
        subdomain, or (3) mark as 'Cross-cutting' with explicit documentation.

    - id: DD_DDD_001_B
      name: "Context completeness check"
      condition: "l6_bounded_contexts_without_rules > 0"
      action: WARN
      severity: NON_BLOCKING
      message: >
        One or more bounded contexts contain no L5 business rules. This may indicate:
        (1) rules exist but were not extracted, (2) the context is purely infrastructure
        with no business logic, or (3) the context boundary is incorrectly drawn.
      mitigation: >
        Review each empty context. If it is purely infrastructure (e.g., auth adapter,
        email sender), reclassify as 'Generic' subdomain. If business logic should
        exist, trigger a targeted re-extraction for that context's files.

    - id: DD_DDD_001_C
      name: "L7-to-L6 mapping completeness"
      condition: "l7_revenue_streams_without_l6_entities > 0"
      action: WARN
      severity: NON_BLOCKING
      message: >
        One or more L7 revenue streams cannot be mapped to L6 domain entities.
        This suggests either (1) the monetization layer uses unnamed/implicit entities,
        or (2) the L6 entity extraction missed payment-related entities.
      mitigation: >
        Re-examine L6 for payment-related entities (Subscription, Invoice, Payment,
        PricingTier, etc.). If missing, add them with 'extracted from L7 context' annotation.

    - id: DD_DDD_001_D
      name: "Ubiquitous language coverage"
      condition: "l6_glossary_entry_count < 5"
      action: WARN
      severity: NON_BLOCKING
      message: >
        Fewer than 5 ubiquitous language terms extracted. A meaningful domain model
        requires a glossary that bridges developer and business terminology.
      mitigation: >
        Re-run Pass 3 of L6 extraction (language pass) with broader scope.
        Look for: enum values, exception messages, event names, route path segments.

  pass_condition: "No BLOCKING vetos fired"
  output: "data/reports/domain-model-validation.yaml"

# ============================================================
# PHASE 5: BUSINESS MODEL — Business Model Coverage
# ============================================================
DD_BIZ_001:
  id: DD_BIZ_001
  name: "Business Model Coverage Gate"
  phase: 5
  phase_name: "Business Model Validation"
  agent: validation-arbiter
  purpose: >
    Verify that the business model extraction is internally consistent and covers
    all detectable revenue-generating paths before final delivery.
  category: "coverage_check"

  inputs:
    required:
      - "data/findings/l7-business-model.yaml"
      - "data/findings/l5-business-rules.yaml"

  checks:
    - id: DD_BIZ_001_A
      name: "Revenue stream traceability"
      condition: "l7_revenue_streams_without_code_reference > 0"
      action: VETO
      severity: BLOCKING
      message: >
        One or more revenue streams in the L7 model have no code reference (file + line).
        Domain Decoder's core principle is full traceability. Untraceable revenue claims
        are hallucinations or assumptions, not extractions.
      resolution: >
        For each untraceable revenue stream: either (1) find the code evidence and add
        the reference, or (2) reclassify as 'Inferred from API naming' with explicit
        lower confidence annotation.

    - id: DD_BIZ_001_B
      name: "Payment gateway coverage"
      condition: "payment_gateways_detected > 0 AND l7_revenue_streams_count == 0"
      action: WARN
      severity: NON_BLOCKING
      message: >
        Payment gateway integrations detected (e.g., Stripe, PayPal) but no revenue
        streams extracted. The business logic that drives payment may be in an
        unexpected location (frontend, mobile app, webhook handler).
      mitigation: >
        Expand L7 Pass 1 to include webhook handler files and external API client files.
        The Stripe Checkout integration may drive revenue without backend pricing logic.

    - id: DD_BIZ_001_C
      name: "Pricing rule consistency"
      condition: "conflicting_pricing_rules_found"
      action: WARN
      severity: NON_BLOCKING
      message: >
        Conflicting pricing rules detected (same pricing logic with different values
        in different files). This is a common brownfield signal — pricing evolved
        but wasn't unified. Both versions must be documented with file references.
      mitigation: >
        Document both conflicting versions. Use git commit date to identify the
        more recent version. Flag for business stakeholder validation.

  pass_condition: "No BLOCKING vetos fired"
  output: "Annotated l7-business-model.yaml"

# ============================================================
# PHASE 6: VALIDATION — Validation Gate (BLOCKING)
# ============================================================
DD_VAL_001:
  id: DD_VAL_001
  name: "Cross-Layer Validation Gate"
  phase: 6
  phase_name: "Cross-Validation (BLOCKING)"
  agent: validation-arbiter
  blocking: true
  purpose: >
    The final quality gate before delivery. Cross-layer consistency is mandatory.
    This gate is fully BLOCKING — no exceptions. A failed cross-validation means
    the extraction has structural errors that would mislead stakeholders.
  category: "cross_validation"

  inputs:
    required:
      - "data/findings/l5-business-rules.yaml"
      - "data/findings/l6-domain-taxonomy.yaml"
      - "data/findings/l7-business-model.yaml"
      - "data/findings/l8-tech-debt.yaml"
      - "data/roundtable/resolved-debates.yaml"

  checks:
    - id: DD_VAL_001_A
      name: "L5-L6 bidirectional coverage"
      condition: >
        ANY(l5_rule.bounded_context NOT IN l6_bounded_contexts) OR
        ANY(l6_bounded_context.business_rules IS EMPTY AND
            l6_bounded_context.classification == 'Core')
      action: VETO
      severity: BLOCKING
      message: >
        L5/L6 bidirectional coverage check failed:
        (A) At least one business rule references a bounded context that does not exist in L6, OR
        (B) At least one Core bounded context has zero business rules.
        The domain model and business rule catalog must be mutually consistent.
      resolution: "Resolve cross-reference errors before delivery. No exceptions."

    - id: DD_VAL_001_B
      name: "Overall confidence threshold"
      condition: "overall_weighted_confidence < 0.60"
      action: VETO
      severity: BLOCKING
      message: >
        Overall extraction confidence is below 60%. This means more than 40% of all
        findings are LOW confidence (single-source). A deliverable at this quality level
        would be misleading and potentially harmful to business decisions.
      resolution: >
        Run targeted re-extraction for the lowest-confidence findings.
        If after retry overall confidence is still below 60%, deliver as
        PARTIAL extraction with explicit scope limitations documented.

    - id: DD_VAL_001_C
      name: "Human validation flagging"
      condition: "human_validation_flagged_percentage > 0.20"
      action: WARN
      severity: NON_BLOCKING
      message: >
        More than 20% of findings are flagged for human validation. The extraction
        has significant uncertainty. Final deliverable should prominently display
        a human validation recommendation.
      mitigation: >
        Include a 'Requires Expert Review' section in the executive summary.
        Prioritize the 20% flagged findings for the first stakeholder review session.

    - id: DD_VAL_001_D
      name: "Coverage proxy metrics"
      condition: >
        entry_point_coverage < 0.85 OR
        test_implied_coverage < 0.70 OR
        domain_entity_coverage < 0.80 OR
        conditional_logic_coverage < 0.75 OR
        composite_score < 0.70
      action: WARN
      severity: NON_BLOCKING
      message: >
        One or more coverage proxy metrics are below target thresholds.
        The extraction may have gaps in specific areas.
      thresholds:
        entry_point_coverage: ">= 85% of entry points traced"
        test_implied_coverage: ">= 70% of rules have test evidence"
        domain_entity_coverage: ">= 80% of entities documented"
        conditional_logic_coverage: ">= 75% of business conditionals extracted"
        composite_score: ">= 0.70 weighted composite"
      mitigation: "Document which proxies are below target in the confidence dashboard."

  pass_condition: "DD_VAL_001_A and DD_VAL_001_B both pass (no BLOCKING vetos)"
  output: "data/reports/cross-validation-report.yaml"

# ============================================================
# PHASE 7: DOCUMENTATION — Documentation Completeness
# ============================================================
DD_DOC_001:
  id: DD_DOC_001
  name: "Documentation Completeness Gate"
  phase: 7
  phase_name: "Synthesis and Delivery"
  agent: documentation-scribe
  purpose: >
    Verify that the final deliverable package is complete and meets all structural
    requirements before being handed to the requesting stakeholder.
  category: "completeness_check"

  inputs:
    required:
      - "data/reports/cross-validation-report.yaml"
      - "All l5, l6, l7, l8 findings files"

  checks:
    - id: DD_DOC_001_A
      name: "Deliverable file completeness"
      condition: >
        NOT EXISTS(domain-decoder-output/00-executive-summary.md) OR
        NOT EXISTS(domain-decoder-output/01-business-rules-catalog.md) OR
        NOT EXISTS(domain-decoder-output/02-domain-taxonomy.yaml) OR
        NOT EXISTS(domain-decoder-output/03-business-model-blueprint.md) OR
        NOT EXISTS(domain-decoder-output/06-confidence-dashboard.md)
      action: VETO
      severity: BLOCKING
      message: >
        Required deliverable files are missing from the output package.
        The minimum viable delivery requires: executive summary, business rules catalog,
        domain taxonomy, business model blueprint, and confidence dashboard.
      resolution: "Generate missing files before marking delivery complete."

    - id: DD_DOC_001_B
      name: "Executive summary non-technical readability"
      condition: "executive_summary_contains_code_snippets OR executive_summary_jargon_density > 0.15"
      action: WARN
      severity: NON_BLOCKING
      message: >
        Executive summary may not be readable by non-technical stakeholders.
        It should contain zero code snippets and minimal technical jargon.
        Apply the 'teste da filha' (daughter test): would a non-technical reader understand it?
      mitigation: "Rewrite flagged sections in plain business language."

    - id: DD_DOC_001_C
      name: "Source traceability completeness"
      condition: "findings_without_source_reference_percentage > 0.05"
      action: WARN
      severity: NON_BLOCKING
      message: >
        More than 5% of findings lack source code references (file + line number).
        Full traceability is a core Domain Decoder principle. Untraceable findings
        cannot be verified or validated by stakeholders.
      mitigation: "Add source references to flagged findings or explicitly mark as 'inferred'."

    - id: DD_DOC_001_D
      name: "Glossary coverage"
      condition: "l6_glossary_entry_count < 5 AND codebase_size != 'small'"
      action: WARN
      severity: NON_BLOCKING
      message: >
        The ubiquitous language glossary has fewer than 5 entries for a non-small codebase.
        A sparse glossary suggests either incomplete L6 extraction or a system with
        minimal domain-specific vocabulary (common in infrastructure/utility systems).
      mitigation: "Review glossary. If domain is vocabulary-rich, re-run L6 Pass 3."

  pass_condition: "DD_DOC_001_A passes (no BLOCKING vetos)"
  output: "domain-decoder-output/ (complete deliverable package)"

# ============================================================
# GLOBAL PIPELINE GUARDRAILS
# ============================================================
pipeline_guardrails:

  loop_prevention:
    description: "Each extraction pass has a hard maximum"
    limits:
      max_passes_per_layer: 3
      max_roundtable_rounds: 3
      max_phase_retries: 1
    enforcement: "If max reached, document as 'reached maximum iterations' and proceed"

  idempotency:
    description: "Re-running any phase with identical inputs produces identical outputs"
    mechanism: "Phase outputs are deterministic. If re-run, compare checksums to detect drift."
    exception: "LLM outputs are inherently non-deterministic; use temperature=0 where available"

  audit_trail:
    description: "Every finding has a source reference; every decision has a rationale"
    requirements:
      - "All L5 findings: file + line + snippet"
      - "All L6 boundaries: evidence references"
      - "All Roundtable decisions: propositor, challenger, verdict, rationale"
      - "All veto fires: condition, firing value, resolution taken"

  manual_escape:
    description: "Pipeline can be paused at any point for human review"
    command: "*pause"
    effect: "Stops pipeline, surfaces current state in readable format for human inspection"
    resume_command: "*resume {phase}"

  retry_logic:
    description: "Failed LLM extractions retry with smaller context, not the same prompt"
    mechanism: >
      If extraction fails (token limit, hallucination detected via Roundtable rejection):
      Retry with 50% of the context window. If still fails, mark as 'requires manual review'
      and continue to next candidate. Do not retry with identical inputs.

  correction_protocol:
    description: "Later phases cannot modify earlier phase outputs — only add corrections"
    mechanism: >
      If Phase 4 discovers a Phase 1 finding is wrong, it creates a
      CORRECTION entry in l8-tech-debt.yaml or a standalone correction-log.yaml.
      The original L1 output is never edited. This preserves the audit trail.

# ============================================================
# VETO CONDITION SUMMARY TABLE
# ============================================================
veto_summary:
  blocking_veto_count: 9
  warning_count: 14
  total: 23

  blocking_vetos:
    - "DD_GAP_001_A: Codebase < 500 LOC"
    - "DD_GAP_001_B: No executable code found"
    - "DD_GAP_001_C: Code is obfuscated"
    - "DD_INV_001_A: Primary language cannot be identified"
