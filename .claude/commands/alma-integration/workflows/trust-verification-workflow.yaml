name: trust-verification-workflow
version: 1.0.0
description: |
  Veritas trust verification workflow.
  Enforces 5 trust behaviors with evidence collection.

state_file: .aios/state/trust-verification.json
artifacts_dir: .aios/veritas

# Trust Flow Diagram
# ╔═══════════════════════════════════════════════════════════════════╗
# ║                    Veritas Trust Framework                             ║
# ╠═══════════════════════════════════════════════════════════════════╣
# ║                                                                    ║
# ║  1. PRE-INVOCATION                                                 ║
# ║     ┌─────────────┐                                                 ║
# ║     │  Check     │──NO──> Block invocation                            ║
# ║     │  Trust     │                                                  ║
# ║     │  Score     │                                                  ║
# ║     └─────┬─────┘                                                  ║
# ║           │ YES                                                      ║
# ║           ▼                                                          ║
# ║  2. EXECUTION (with evidence collection)                                ║
# ║     ┌─────────────────────────────────────────┐                          ║
# ║     │ Collect evidence from all tools       │                          ║
# ║     │ - Bash: stdout, exitCode            │                          ║
# ║     │ - Write: filePath, content          │                          ║
# ║     │ - Read: filePath                  │                          ║
# ║     └─────────────────────────────────────────┘                          ║
# ║           │                                                          ║
# ║           ▼                                                          ║
# ║  3. POST-INVOCATION                                                ║
# ║     ┌─────────────────────────────────────────┐                          ║
# ║     │ Verify all 5 behaviors             │                          ║
# ║     │ - Verification Before Claim         │                          ║
# ║     │ - Loud Failure                   │                          ║
# ║     │ - Honest Uncertainty             │                          ║
# ║     │ - Paper Trail                   │                          ║
# ║     │ - Diligent Execution             │                          ║
# ╔═══════════════════════════════════════════════════════════════════════════╝
# ║           │                                                          ║
# ║           ▼                                                          ║
# ║  4. TRUST UPDATE                                                   ║
# ║     ┌─────────────────┐                                             ║
# ║     │ Update score    │                                             ║
# ║     │ Record session │                                             ║
# ║     └─────────────────┘                                             ║

# Trust Levels
trust_levels:
  FULL:
    score: 1.0
    permissions: [execute, modify, delete, deploy]
    description: "Complete trust"

  HIGH:
    score: 0.85
    permissions: [execute, modify]
    description: "High trust, no critical operations"

  GOOD:
    score: 0.7
    permissions: [execute, modify]
    description: "Good trust, medium operations"

  MODERATE:
    score: 0.5
    permissions: [execute]
    description: "Moderate trust, execution only"

  LOW:
    score: 0.4
    permissions: [execute_low_risk]
    description: "Low trust, read-only and low-risk operations"

  MINIMAL:
    score: 0.2
    permissions: [read_only]
    description: "Minimal trust, read-only"

  UNTRUSTED:
    score: 0.0
    permissions: []
    description: "No trust, blocked"

# Behavior Definitions
behaviors:
  verification_before_claim:
    id: "verification_before_claim"
    description: "Claims must be backed by verifiable evidence"
    severity: "high"
    check: |
      Evidence includes one of:
      - testResults (with passing status)
      - commandOutput.success === true
      - verificationPassed === true
    violation_message: "Claimed completion without verification evidence"
    remediation: "Run tests and include output in completion message"

  loud_failure:
    id: "loud_failure"
    description: "Errors must be explicitly reported, never silent"
    severity: "medium"
    check: |
      If errors occurred:
      - error must be in output/message
      - hasErrorReport === true
    violation_message: "Errors occurred but were not explicitly reported"
    remediation: "Explicitly state what error occurred and what you tried"

  honest_uncertainty:
    id: "honest_uncertainty"
    description: "Low confidence must be acknowledged"
    severity: "low"
    check: |
      If confidence < threshold (0.7):
      - uncertaintyAcknowledged === true
    violation_message: "Low confidence expressed without acknowledging uncertainty"
    remediation: "Use phrases like 'I believe', 'probably', 'uncertain'"

  paper_trail:
    id: "paper_trail"
    description: "Sufficient documentation and artifacts must exist"
    severity: "medium"
    check: |
      One of:
      - artifacts.length > 0
      - filesModified.length > 0
      - documentationCreated === true
    violation_message: "Insufficient documentation/paper trail for completed work"
    remediation: "Add comments to code and describe changes in commit messages"

  diligent_execution:
    id: "diligent_execution"
    description: "Work must be verified through tests or review"
    severity: "high"
    check: |
      One of:
      - testsRun === true
      - codeReviewed === true
      - verificationSteps.length > 0
    violation_message: "Completion claimed without test verification or review"
    remediation: "Always run tests before claiming a task is complete"

# Evidence Collection
evidence_mapping:
  Bash:
    success: "exitCode === 0"
    output: "stdout"
    error: "stderr"
    has_error_report: "stderr.length > 0 AND error stated in output"

  Write:
    files_modified: "filePath"
    artifacts: "['file_change']"

  Edit:
    files_modified: "filePath"
    artifacts: "['file_change']"

  Read:
    file_accessed: "filePath"

  Task:
    sub_task_completed: "status === 'completed'"
    sub_task_result: "result"

# Permission Thresholds
permission_thresholds:
  execute:
    low: 0.3
    medium: 0.5
    high: 0.7
    critical: 0.85

  modify:
    low: 0.4
    medium: 0.6
    high: 0.8
    critical: 0.9

  delete:
    low: 0.5
    medium: 0.7
    high: 0.85
    critical: 0.95

  deploy:
    low: 0.6
    medium: 0.75
    high: 0.9
    critical: 0.95

# Risk Assessment
risk_assessment:
  critical:
    keywords: [delete, drop, remove_force, deploy_production, release]
    condition: "hasProductionAccess === true"
    default_threshold: 0.85

  high:
    keywords: [modify_core, change_api, update_schema, migrate]
    default_threshold: 0.7

  low:
    keywords: [read, view, list, get, fetch]
    default_threshold: 0.3

  medium:
    default_threshold: 0.5
    description: "Default when no keywords match"

# Trust Decay
trust_decay:
  enabled: true
  half_life_days: 30
  formula: "decay = exp(-0.693 * daysSince / halfLifeDays)"
  min_decay: 0.5
  description: "Trust scores decay over time without activity"

# Streak Tracking
streaks:
  clean_sessions:
    bonus: "+0.02 per session, max +0.1"
    description: "Consecutive sessions without violations"

  violation_sessions:
    penalty: "-0.05 per session, max -0.2"
    description: "Consecutive sessions with violations"

# Verification Gates
gates:
  pre_invocation:
    - check: "trust_score >= required_threshold"
      action: "block if false"
      message: "Trust score {score}% below required {required}%"

  post_invocation:
    - check: "all_behaviors_passed"
      action: "record success if true, violation if false"
    - check: "evidence_collected"
      action: "warn if insufficient"

  session_end:
    - check: "had_violations"
      action: "reset clean streak if true, increment if false"
    - save: "profile to disk"

# Rollback
rollback:
  disable_veritas:
    method: "Comment out hook calls in agent-invoker.js"
    file: ".aios-core/core/orchestration/agent-invoker.js"

  reset_trust:
    method: "Delete .aios/veritas/profiles.json"
    effect: "All agents return to base trust level"

  view_audit:
    command: "cat .aios/veritas/audit.log"
    description: "View trust violations and corrections"
